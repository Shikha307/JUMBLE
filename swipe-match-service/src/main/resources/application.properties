spring.application.name=swipe-match-service

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

logging.level.com.jumble.swipematch=DEBUG
# Using Redis Hash mapping doesn't strictly require extra properties, but we set application name and basic Redis details.
